name: Package Desktop Builds

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    name: Package ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            native
          cache-on-failure: true

      - name: Cache flutter_rust_bridge_codegen
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen*
          key: ${{ runner.os }}-frb-${{ hashFiles('**/Cargo.lock', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-frb-

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen

      - name: Flutter pub get
        run: flutter pub get

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\build.ps1 package --release

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: bash ./build.sh package --release

      - name: Create release archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path dist -Directory -Filter "deepssh-${{ matrix.platform }}-*" | Select-Object -First 1
          if (-not $package) {
            throw "Package directory not found for ${{ matrix.platform }}"
          }
          Compress-Archive -Path $package.FullName -DestinationPath "$($package.FullName).zip" -Force

      - name: Create release archive (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          package=$(ls -d dist/deepssh-macos-* 2>/dev/null | head -n1)
          if [ -z "$package" ]; then
            echo "Package directory not found for macOS" >&2
            exit 1
          fi
          # Use ditto to preserve symlinks, extended attributes, and resource forks
          ditto -c -k --sequesterRsrc --keepParent "$package" "$package.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepssh-${{ matrix.platform }}
          path: dist/deepssh-${{ matrix.platform }}-*.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/deepssh-${{ matrix.platform }}-*.zip
